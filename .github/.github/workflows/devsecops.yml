name: DevSecOps Complete Pipeline

on:
  push:
    # Đã đổi thành master theo đúng repo của bạn
    branches: [ "master" ] 
  pull_request:
    branches: [ "master" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. TẢI CODE (Bắt buộc fetch-depth: 0 để SonarCloud nhận diện nhánh master)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 2. CÀI ĐẶT MÔI TRƯỜNG
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      # 3. SCA - QUÉT THƯ VIỆN BỊ LỖI
      - name: SCA - npm audit
        run: npm audit --audit-level=high
        # Tạm thời cho phép đi tiếp kể cả khi có lỗi thư viện để các bước sau vẫn được chạy
        continue-on-error: true 

      # 4. SAST - SONARCLOUD (Đã fix chuẩn 1 dòng, loại trừ node_modules)
      - name: SAST - SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.projectKey=prj1-20252-e15_prj1-20252-e15 -Dsonar.organization=prj1-20252-e15 -Dsonar.sources=. -Dsonar.exclusions=node_modules/** -Dsonar.branch.name=master
          projectBaseDir: .

      # 5. KHỞI ĐỘNG SERVER NGẦM CHO ZAP
      - name: Start Application in Background
        run: |
          npm start &
          sleep 15

      # 6. DAST - OWASP ZAP SCAN
      - name: DAST - OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false # Tạm để false để pipeline chạy đến cuối, lấy báo cáo trước
