name: OWASP ZAP DAST Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * 0' # Optional: Run a weekly scan on Sundays

jobs:
  zap-scan:
    name: Run DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      # ==========================================
      # CRITICAL STEP: Start the app so ZAP can scan it
      # ==========================================
      - name: Start Application in Background
        run: |
          npm start &
          sleep 15 # Wait 15 seconds to ensure the server is fully up on port 3000

      # ==========================================
      # RUN OWASP ZAP
      # ==========================================
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          # Set to 'false' so the pipeline doesn't crash while you are just testing.
          # Change to 'true' later if you want the pipeline to block insecure code.
          fail_action: false 

      # ==========================================
      # SAVE THE REPORT
      # ==========================================
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always() # Always save the report, even if vulnerabilities are found
        with:
          name: ZAP-Security-Report
          path: report_html.html
