name: OWASP ZAP DAST Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  zap-scan:
    name: Run DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. CÀI ĐẶT MÔI TRƯỜNG PYTHON
      # ==========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # Phiên bản Python ổn định cho VAmPI

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ==========================================
      # 2. KHỞI ĐỘNG VAmPI
      # ==========================================
      - name: Start VAmPI in Background
        run: |
          python app.py &
          sleep 15 # Chờ 15 giây để server Flask mở cổng 5000

      # ==========================================
      # 3. CHẠY OWASP ZAP (QUÉT CỔNG 5000)
      # ==========================================
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000' # VAmPI mặc định chạy ở cổng này
          fail_action: false 

      # ==========================================
      # 4. LƯU BÁO CÁO
      # ==========================================
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ZAP-Security-Report
          path: report_html.html
