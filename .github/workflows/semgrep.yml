name: Semgrep

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '44 19 * * 0'

permissions:
  contents: read

jobs:
  semgrep:
    permissions:
      contents: read # Để tải code về
      security-events: write # BẮT BUỘC để đẩy báo cáo lỗi (SARIF) lên GitHub
      actions: read 
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Quét code bằng bộ luật Open Source của Semgrep (Không cần Token)
      - name: Run Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          generateSarif: "1"

      # Đẩy file báo cáo lên giao diện GitHub
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()
