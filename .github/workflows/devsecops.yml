name: VAmPI DevSecOps pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: #manual workflow trigger

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read # cannot overwrite code
      security-events: write # for Semgrep report
      issues: write          # for ZAP report
      pull-requests: read    # for SonarCloud

    steps:
      - name: code-checkout
        uses: actions/checkout@v4 #git clone to the runner (VM)
        with:
          fetch-depth: 0 #for sonarcloud to recognize code structure

      - name: python-setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' 

      - name: dependancies
        run: |
          python -m pip install --upgrade pip==24.0 --only-binary :all:
          pip install --only-binary :all: -r requirements.txt
          pip install pytest==8.1.1 pytest-cov==4.1.0

      - name: SAST-semgrep
        run: |
          pip install semgrep==1.136.0 --only-binary :all:
          semgrep scan --config "p/default" --error --sarif --output semgrep.sarif

      - name: semgrep-sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: semgrep.sarif
          
      - name: unittest
        run: |
          python -m pytest --cov=. --cov-report=xml:coverage.xml tests/
          
      - name: SAST-sonarcloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.projectKey=elysiaclisee_VAmPI -Dsonar.organization=elysiaclisee -Dsonar.sources=. -Dsonar.qualitygate.wait=false
          projectBaseDir: .

      - name: SCA
        continue-on-error: true
        run: |
          pip install pip-audit==2.9.0 --only-binary :all:
          pip-audit -r requirements.txt

      - name: VAmPI-backstart
        run: |
          python app.py &
          sleep 15 

      - name: DAST-zap
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000' 
          fail_action: true #quality gate
          artifact_name: zap-scan

      - name: zapreport
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: zapreport
          path: report_html.html
